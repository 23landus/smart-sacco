{% extends 'base.html' %}

{% block content %}
<div class="relative min-h-screen w-full flex items-center justify-center py-12 px-4 bg-fixed bg-green-950" 
     style="background-image: url('https://i.pinimg.com/1200x/01/d2/8d/01d28d62896b8a45a76862a76c2be7d7.jpg'); background-size: cover; background-position: center;">
    
    <div class="absolute inset-0 bg-gradient-to-b from-green-950/90 via-black/20 to-green-950/80 backdrop-blur-[1px]"></div>

    <div class="relative z-10 w-full max-w-xl">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic drop-shadow-lg">Report Saving</h1>
            <p class="text-[10px] text-green-400 font-black uppercase tracking-[0.4em] mt-2">Institutional Capital Growth</p>
        </div>

        <div class="bg-green-600/20 backdrop-blur-xl rounded-[2rem] p-6 shadow-2xl mb-8 border border-white/10 group overflow-hidden relative">
            <div class="relative z-10 flex items-center gap-4">
                <div class="bg-green-500/40 p-3 rounded-2xl border border-white/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <div>
                    <p class="text-[9px] font-black text-green-300 uppercase tracking-widest opacity-80">Safety Protocol</p>
                    <h3 class="text-sm font-medium text-white leading-tight">Verification required. Deposit reflects after Treasurer approval.</h3>
                </div>
            </div>
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-white/5 rounded-full transition-transform group-hover:scale-150 duration-1000"></div>
        </div>

        <div class="bg-white/95 backdrop-blur-2xl rounded-[2.5rem] shadow-2xl p-8 md:p-12 border border-white">
            <form method="post" class="space-y-8">
                {% csrf_token %}
                
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Deposit Amount</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-green-600/50 group-focus-within:text-green-600 transition-colors">
                            <span class="font-bold text-sm uppercase">UGX</span>
                        </div>
                        <input type="number" name="amount" 
                            class="w-full pl-20 pr-6 py-5 bg-gray-50/50 border-2 border-transparent rounded-2xl focus:border-green-600 focus:bg-white focus:ring-0 font-black text-gray-900 transition-all outline-none text-lg"
                            placeholder="0.00" required>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">Transaction Reference / ID</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none text-gray-300 group-focus-within:text-green-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-4m0 0l4 4m-4-4v12M3 4h18M3 8h18m-18 4h18"></path></svg>
                        </div>
                        <input type="text" name="reference_code" 
                            class="w-full pl-14 pr-6 py-5 bg-gray-50/50 border-2 border-transparent rounded-2xl focus:border-green-600 focus:bg-white focus:ring-0 font-black text-gray-900 transition-all outline-none"
                            placeholder="M-Pesa / Bank ID" required>
                    </div>
                    <p class="text-[9px] text-gray-400 font-bold italic ml-2">* Ensure code matches your transaction receipt.</p>
                </div>

                <div class="pt-4 flex flex-col gap-4">
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-green-200 transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-[0.2em] text-xs">
                        Confirm & Log Saving
                    </button>
                    <a href="{% url 'dashboard' %}" class="text-center py-2 text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-red-500 transition-colors">
                        Cancel & Return
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
