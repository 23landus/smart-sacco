<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart SACCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            /* Updated background image */
            background-image: url('https://i.pinimg.com/1200x/c8/1c/0d/c81c0d775dde3ef625571720b259f692.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Optional: Add a subtle overlay to the body to ensure text readability on all pages */
        .page-overlay {
            background-color: rgba(249, 250, 251, 0.9); /* matches bg-gray-50 with 90% opacity */
            min-height: 100vh;
        }
    </style>
</head>
<body class="text-gray-900">
    <div class="page-overlay">
        {% if user.is_authenticated %}
        <nav class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
            <div class="container mx-auto px-4 md:px-6 py-3 flex justify-between items-center">
                
                <div class="flex items-center space-x-3">
                    <div class="bg-white text-blue-700 h-9 w-9 flex items-center justify-center rounded-xl font-black text-lg shadow-sm">SS</div>
                    <h1 class="font-black text-xl tracking-tight hidden sm:block">Smart SACCO</h1>
                </div>

                <div class="flex items-center space-x-2 md:space-x-4">
                    <a href="{% url 'dashboard' %}" class="text-white font-bold text-sm px-3 py-2 rounded-lg hover:bg-blue-600 transition duration-200">
                        Dashboard
                    </a>

                    {% if user.is_superuser %}
                        <a href="{% url 'treasurer_dashboard' %}" class="bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-black hover:bg-red-700 transition shadow-md border border-red-500">
                            TP
                        </a>
                    {% endif %}
                </div>

                <div class="flex items-center space-x-4">
                    <div class="hidden lg:flex items-center space-x-6 mr-4 border-r border-blue-600 pr-6 font-semibold text-sm">
                        <a href="{% url 'log_deposit' %}" class="text-blue-100 hover:text-white transition">Deposit</a>
                        <a href="{% url 'apply_loan' %}" class="text-blue-100 hover:text-white transition">Request Loan</a>
                    </div>

                    <div class="flex items-center space-x-3">
                        <div class="flex items-center bg-blue-800/40 rounded-full pl-1 pr-3 py-1 border border-blue-500/30 group cursor-default">
                            <div class="relative">
                                <div class="h-8 w-8 rounded-full bg-white flex items-center justify-center text-blue-700 font-bold text-xs shadow-inner">
                                    {{ user.username|slice:":1"|upper }}
                                </div>
                                <span class="absolute bottom-0 right-0 block h-2.5 w-2.5 rounded-full bg-green-400 ring-2 ring-blue-700"></span>
                            </div>
                            <div class="ml-2 hidden sm:block">
                                <p class="text-[10px] text-blue-200 font-bold leading-tight uppercase tracking-tighter">Member</p>
                                <p class="text-xs font-black text-white leading-tight truncate max-w-[100px]">
                                    {{ user.username }}
                                </p>
                            </div>
                        </div>
                        
                        <form action="{% url 'logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="p-2 rounded-xl bg-blue-800/50 hover:bg-red-500 text-white transition-all duration-200 border border-blue-500/50 shadow-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
        {% endif %}

        <main class="min-h-screen">
            {% block content %}{% endblock %}
        </main>

        <footer class="py-10 border-t border-gray-200/50 text-center text-gray-400 text-xs">
            <p class="font-bold text-gray-500 mb-1">&copy; 2026 Smart SACCO Finance System</p>
        </footer>
    </div>
</body>
</html>
